<div class="w-full max-w-[780px] bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden flex flex-col self-start" role="region" aria-label="Elixir Process Inspector">
  <div class="px-5 py-4 border-b border-slate-100 flex items-center gap-3.5">
  <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-amber-50 to-amber-100 flex items-center justify-center text-amber-800 font-mono text-xs font-medium flex-none border border-amber-900/10" aria-hidden="true">
    EL
  </div>
  <div class="flex-1 min-w-0">
    <div class="text-[15px] text-slate-900 font-medium flex items-center gap-2 flex-wrap">
      Elixir Process Inspector
      <span class="font-mono text-[10px] bg-blue-50 text-blue-600 px-1.5 py-0.5 rounded-full border border-blue-100 whitespace-nowrap">
        GenieLamp
      </span>
    </div>
    <div class="text-xs text-slate-500 mt-0.5 font-mono truncate">
      elixir.process.list
    </div>
  </div>
</div>
  <form role="form" aria-label="Elixir Process Inspector" aria-describedby="form-process-description" phx-submit="lamp_submit" phx-value-lamp-id="elixir.process.list" phx-change="lamp_field_change">
  
    <p id="form-process-description" class="text-sm text-slate-500 px-5 pt-4 leading-relaxed">
      List and inspect running Elixir processes. Filter by type to narrow results, then click any row to view full Process.info detail.
    </p>
  
  <div class="px-5 py-4 grid grid-cols-2 gap-x-5 gap-y-4">
    
      <div class="flex flex-col gap-1.5 col-span-1 ">
  <label class="text-xs text-slate-500 flex items-center gap-1.5">
    Process Filter
    
      <span class="text-red-400" aria-hidden="true">*</span>
    
    
    <span class="font-mono text-[9.5px] px-1 py-0.5 bg-purple-50 text-purple-600 border border-purple-100 rounded leading-none">
      AI
    </span>
  
  </label>
  <select class="h-9 w-full border rounded-lg px-3 bg-white font-sans text-[13px] text-slate-900 focus:outline-none focus:border-blue-500 focus:ring-[3px] focus:ring-blue-50 transition appearance-none cursor-pointer border-purple-300 bg-purple-50/50" aria-label="Filter running processes by type: all processes, only named registered processes, or only OTP application processes" aria-required="true" name="filter">
  
      
        <option value="all" selected>
          All
        </option>
      
        <option value="named">
          Named Only
        </option>
      
        <option value="application">
          Application
        </option>
      
    
</select>
    
  
    <p id="hint-filter" class="text-[11.5px] text-slate-500">
      Use Named Only to find well-known OTP processes; use Application to scope to this app&#39;s supervision tree.
    </p>
  
</div>
    
    
  </div>
  <div class="border-t border-slate-100 px-5 py-3.5 flex items-center gap-2.5 bg-slate-50" role="group" aria-label="Form actions">
  
    <button type="button" class="h-[34px] px-4 flex items-center gap-1.5 rounded-lg font-sans text-[13px] font-medium cursor-pointer border transition bg-slate-900 text-white border-slate-900 hover:bg-slate-800" aria-label="Fetch running Elixir processes with the selected filter" phx-click="lamp_submit" phx-value-lamp-id="elixir.process.list" phx-value-endpoint-id="list_processes" phx-value-destructive="false">
  List Processes
</button>
  
    <button type="button" class="h-[34px] px-4 flex items-center gap-1.5 rounded-lg font-sans text-[13px] font-medium cursor-pointer border transition bg-white text-slate-900 border-slate-200 hover:border-slate-300" aria-label="Fetch full Process.info detail for the selected process" phx-click="lamp_submit" phx-value-lamp-id="elixir.process.list" phx-value-endpoint-id="fetch_process" phx-value-destructive="false">
  Inspect Process
</button>
  
</div>
</form>
</div>
